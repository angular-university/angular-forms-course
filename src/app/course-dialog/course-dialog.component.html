<div class="dialog-header">
  <div class="dialog-icon">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
    </svg>
  </div>
  <div>
    <h2 class="modal-title">{{ course().description }}</h2>
  </div>
</div>

<form [formRoot]="courseForm">
  <div class="field">
    <label for="description">Course Description</label>
    <input id="description" [formField]="courseForm.description" placeholder="Course description">
    @if (courseForm.description() | touchedError; as error) {
      <div class="err">{{ error }}</div>
    }
  </div>

  <div class="field">
    <label for="category">Category</label>
    <select id="category" [formField]="courseForm.category">
      <option value="BEGINNER">Beginner</option>
      <option value="INTERMEDIATE">Intermediate</option>
      <option value="ADVANCED">Advanced</option>
    </select>
  </div>

  <div class="field">
    <label for="releasedAt">Release Date</label>
    <input id="releasedAt" type="date" [formField]="courseForm.releasedAt">
    @if (courseForm.releasedAt() | touchedError; as error) {
      <div class="err">{{ error }}</div>
    }
  </div>

  <div class="field">
    <label for="longDescription">Long Description</label>
    <textarea id="longDescription" [formField]="courseForm.longDescription" rows="4" placeholder="Long description"></textarea>
    @if (courseForm.longDescription() | touchedError; as error) {
      <div class="err">{{ error }}</div>
    }
  </div>

  <div class="modal-actions">
    <button class="btn btn-ghost" type="button" (click)="close()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      Close
    </button>
    <button class="btn btn-primary" type="submit" [disabled]="courseForm().invalid() || courseForm().submitting()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      Save
    </button>
  </div>
</form>
