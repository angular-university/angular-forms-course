<h2 class="modal-title">{{course.description}}</h2>

<form [formGroup]="form">
  <div class="field">
    <label>Course Description</label>
    <input formControlName="description" placeholder="Course description">
  </div>

  <div class="field">
    <label>Category</label>
    <select formControlName="category">
      <option value="BEGINNER">Beginner</option>
      <option value="INTERMEDIATE">Intermediate</option>
      <option value="ADVANCED">Advanced</option>
    </select>
  </div>

  <div class="field">
    <label>Release Date</label>
    <input type="date" formControlName="releasedAt">
  </div>

  <div class="field">
    <label>Long Description</label>
    <textarea formControlName="longDescription" rows="4" placeholder="Long description"></textarea>
  </div>
</form>

<div class="modal-actions">
  <button class="btn btn-ghost" (click)="close()">Close</button>
  <button class="btn btn-primary" (click)="save()">Save</button>
</div>
