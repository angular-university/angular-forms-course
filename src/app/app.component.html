<div class="shell">
  <header class="toolbar">
    <a class="brand" routerLink="/">
      <!-- Official Angular logo (2023 rebrand) -->
      <svg class="brand-logo" width="26" height="28" viewBox="0 0 223 236" xmlns="http://www.w3.org/2000/svg" fill="none">
        <defs>
          <linearGradient id="ng-logo-b" x1="49.009" x2="225.829" y1="213.75" y2="129.722" gradientUnits="userSpaceOnUse">
            <stop stop-color="#E40035"/>
            <stop offset=".24" stop-color="#F60A48"/>
            <stop offset=".352" stop-color="#F20755"/>
            <stop offset=".494" stop-color="#DC087D"/>
            <stop offset=".745" stop-color="#9717E7"/>
            <stop offset="1" stop-color="#6C00F5"/>
          </linearGradient>
          <linearGradient id="ng-logo-c" x1="41.025" x2="156.741" y1="28.344" y2="160.344" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FF31D9"/>
            <stop offset="1" stop-color="#FF5BE1" stop-opacity="0"/>
          </linearGradient>
          <clipPath id="ng-logo-a"><path fill="#fff" d="M0 0h223v236H0z"/></clipPath>
        </defs>
        <g clip-path="url(#ng-logo-a)">
          <path fill="url(#ng-logo-b)" d="m222.077 39.192-8.019 125.923L137.387 0l84.69 39.192Zm-53.105 162.825-57.933 33.056-57.934-33.056 11.783-28.556h92.301l11.783 28.556ZM111.039 62.675l30.357 73.803H80.681l30.358-73.803ZM7.937 165.115 0 39.192 84.69 0 7.937 165.115Z"/>
          <path fill="url(#ng-logo-c)" d="m222.077 39.192-8.019 125.923L137.387 0l84.69 39.192Zm-53.105 162.825-57.933 33.056-57.934-33.056 11.783-28.556h92.301l11.783 28.556ZM111.039 62.675l30.357 73.803H80.681l30.358-73.803ZM7.937 165.115 0 39.192 84.69 0 7.937 165.115Z"/>
        </g>
      </svg>
      <span class="brand-name">Angular Forms In Depth (Signals Edition)</span>
    </a>

    <nav class="toolbar-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M4 5h7v7H4zm9 0h7v7h-7zM4 13h7v7H4zm9 0h7v7h-7z"/></svg>
        Courses
      </a>
      <a routerLink="/about" routerLinkActive="active">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
        About
      </a>
      <a routerLink="/login" routerLinkActive="active">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        Login
      </a>
    </nav>

    <button class="hamburger" (click)="navOpen.set(!navOpen())" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
        <rect y="3" width="20" height="2" rx="1"/>
        <rect y="9" width="20" height="2" rx="1"/>
        <rect y="15" width="20" height="2" rx="1"/>
      </svg>
    </button>
  </header>

  <div class="sidenav-backdrop" [class.open]="navOpen()" (click)="navOpen.set(false)"></div>

  <nav class="sidenav" [class.open]="navOpen()" (click)="navOpen.set(false)">
    <ul>
      <li><a routerLink="/">Courses</a></li>
      <li><a routerLink="/about">About</a></li>
      <li><a routerLink="/login">Login</a></li>
    </ul>
  </nav>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
