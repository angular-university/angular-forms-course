<div class="course">
  <h2>{{course().description}}</h2>
  <img class="course-thumbnail" [src]="course().iconUrl">

  <div class="field">
    <input placeholder="Search lessons" [value]="rawSearch()" (input)="onSearch($event)">
  </div>

  @if (loading()) {
    <div class="spinner"></div>
  }

  <div class="card table-card">
    <table>
      <thead>
        <tr>
          <th class="sortable" (click)="toggleSort()"># {{sortDirection() === 'asc' ? '↑' : '↓'}}</th>
          <th>Description</th>
          <th>Duration</th>
        </tr>
      </thead>
      <tbody>
        @for (lesson of lessons(); track lesson.id) {
          <tr>
            <td>{{lesson.seqNo}}</td>
            <td class="description-cell">{{lesson.description}}</td>
            <td class="duration-cell">{{lesson.duration}}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <div class="pagination">
    <button class="btn btn-ghost" (click)="prevPage()" [disabled]="pageIndex() === 0">&#8592; Prev</button>
    <span class="page-info">Page {{pageIndex() + 1}}</span>
    <button class="btn btn-ghost" (click)="nextPage()" [disabled]="(pageIndex() + 1) * pageSize >= course().lessonsCount">Next &#8594;</button>
  </div>
</div>
