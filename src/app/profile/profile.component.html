<div class="profile-page">
  <h2 class="profile-title">My Profile</h2>

  <div class="card profile-card">

    <div class="profile-avatar-bar">
      <div class="profile-avatar">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
      </div>
      <div>
        <div class="profile-avatar-label">Account</div>
      </div>
    </div>

    <div class="profile-form">
      <form [formRoot]="profileForm">

        <div class="field">
          <label for="email">Email address</label>
          <input id="email" type="email" [formField]="profileForm.email" placeholder="your@email.com">
          @if (profileForm.email().readonly()) {
            <div class="hint">Email cannot be changed after registration</div>
          }
        </div>

        <address-form [formField]="profileForm.address" legend="Billing Address" />

        @if (profileForm().dirty()) {
          <div class="unsaved-warning">You have unsaved changes</div>
        }

        <div class="form-actions">
          <button class="btn btn-primary" type="submit" [disabled]="profileForm().submitting()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            @if (profileForm().submitting()) { Saving… } @else { Save profile }
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
