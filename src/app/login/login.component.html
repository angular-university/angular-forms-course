<div class="login-page">
  <div class="card login-card">
    <h2 class="login-title">Login</h2>

    <form class="login-form" [formRoot]="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" [formField]="loginForm.email" placeholder="your@email.com">
        @if (loginForm.email() | fieldError; as error) {
          <div class="err">{{ error }}</div>
        }
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" [formField]="loginForm.password" placeholder="Password">
        @if (loginForm.password() | fieldError; as error) {
          <div class="err">{{ error }}</div>
        }
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" type="submit" [disabled]="loginForm().invalid() || loginForm().submitting()">Login</button>
        <button class="btn btn-ghost" type="button" (click)="reset()">Reset</button>
      </div>
    </form>
  </div>
</div>
