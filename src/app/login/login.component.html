<div class="login-page">
  <div class="login-card">

    <div class="login-brand">
      <svg class="login-logo" width="52" height="56" viewBox="0 0 223 236" xmlns="http://www.w3.org/2000/svg" fill="none">
        <defs>
          <linearGradient id="lp-ng-b" x1="49.009" x2="225.829" y1="213.75" y2="129.722" gradientUnits="userSpaceOnUse">
            <stop stop-color="#E40035"/>
            <stop offset=".24" stop-color="#F60A48"/>
            <stop offset=".352" stop-color="#F20755"/>
            <stop offset=".494" stop-color="#DC087D"/>
            <stop offset=".745" stop-color="#9717E7"/>
            <stop offset="1" stop-color="#6C00F5"/>
          </linearGradient>
          <linearGradient id="lp-ng-c" x1="41.025" x2="156.741" y1="28.344" y2="160.344" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FF31D9"/>
            <stop offset="1" stop-color="#FF5BE1" stop-opacity="0"/>
          </linearGradient>
          <clipPath id="lp-ng-a"><path fill="#fff" d="M0 0h223v236H0z"/></clipPath>
        </defs>
        <g clip-path="url(#lp-ng-a)">
          <path fill="url(#lp-ng-b)" d="m222.077 39.192-8.019 125.923L137.387 0l84.69 39.192Zm-53.105 162.825-57.933 33.056-57.934-33.056 11.783-28.556h92.301l11.783 28.556ZM111.039 62.675l30.357 73.803H80.681l30.358-73.803ZM7.937 165.115 0 39.192 84.69 0 7.937 165.115Z"/>
          <path fill="url(#lp-ng-c)" d="m222.077 39.192-8.019 125.923L137.387 0l84.69 39.192Zm-53.105 162.825-57.933 33.056-57.934-33.056 11.783-28.556h92.301l11.783 28.556ZM111.039 62.675l30.357 73.803H80.681l30.358-73.803ZM7.937 165.115 0 39.192 84.69 0 7.937 165.115Z"/>
        </g>
      </svg>
      <h1 class="login-title">Welcome back</h1>
      <p class="login-subtitle">Sign in to your account</p>
    </div>

    <form class="login-form" [formRoot]="loginForm">
      <div class="field">
        <label for="email">Email address</label>
        <input id="email" type="email" [formField]="loginForm.email" placeholder="your@email.com" autocomplete="email">
        @if (loginForm.email() | touchedError; as error) {
          <div class="field-error">{{ error }}</div>
        }
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" [formField]="loginForm.password" placeholder="••••••••" autocomplete="current-password">
        @if (loginForm.password() | touchedError; as error) {
          <div class="field-error">{{ error }}</div>
        }
      </div>

      <div class="form-actions">
        <button class="btn-login" type="submit" [disabled]="loginForm().submitting()">
          @if (loginForm().submitting()) {
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
            Signing in…
          } @else {
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M10 17v-3H3v-4h7V7l5 5-5 5zm-1-2v1.5L14.5 12 9 7.5V9H2v6h7z"/><path d="M20 3h-9v2h9v14h-9v2h9a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/></svg>
            Sign in
          }
        </button>
        <button class="btn-reset" type="button" (click)="reset()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          Reset
        </button>
      </div>
    </form>

  </div>
</div>
