<h3>Add Course Lessons</h3>

<div class="add-lessons-form" [formGroup]="form">
  <ng-container formArrayName="lessons">
    @for (lessonForm of lessons.controls; track lessonForm; let i = $index) {
      <div class="lesson-row" [formGroup]="lessonForm">
        <div class="field">
          <input formControlName="title" placeholder="Lesson title">
        </div>
        <div class="field">
          <select formControlName="level">
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
          </select>
        </div>
        <button class="btn-delete" type="button" (click)="deleteLesson(i)" title="Delete">×</button>
      </div>
    }
  </ng-container>

  <button class="btn-icon" type="button" (click)="addLesson()" title="Add lesson">+</button>
</div>
