<div class="field">
  <label>Course Type</label>
  <div class="radio-group">
    <label class="radio-option">
      <input type="radio" [formField]="step2Form.courseType" value="free"> Free
    </label>
    <label class="radio-option">
      <input type="radio" [formField]="step2Form.courseType" value="premium"> Premium
    </label>
  </div>
</div>

<file-upload [formField]="step2Form.thumbnail" requiredFileType="image/png"></file-upload>

<div class="field">
  <label>Price</label>
  <input type="number" [formField]="step2Form.price" placeholder="Price">
  @if (step2Form.price() | touchedError; as error) {
    <div class="err">{{ error }}</div>
  }
</div>

<div class="field">
  <label>Promo Start Date</label>
  <input type="date" [formField]="step2Form.promoStartAt">
</div>

<div class="field">
  <label>Promo End Date</label>
  <input type="date" [formField]="step2Form.promoEndAt">
</div>

@if (step2Form().dirty()) {
  @if (step2Form() | touchedError; as error) {
    <div class="err">{{ error }}</div>
  }
}
