<div [formGroup]="form">
  <div class="field">
    <label>Course Type</label>
    <div class="radio-group">
      <label class="radio-option">
        <input type="radio" formControlName="courseType" value="free"> Free
      </label>
      <label class="radio-option">
        <input type="radio" formControlName="courseType" value="premium"> Premium
      </label>
    </div>
  </div>

  <file-upload formControlName="thumbnail" requiredFileType="image/png"></file-upload>

  <div class="field">
    <label>Price</label>
    <input type="number" formControlName="price" placeholder="Price">
  </div>

  <div class="field">
    <label>Promo Start Date</label>
    <input type="date" formControlName="promoStartAt">
  </div>

  <div class="field">
    <label>Promo End Date</label>
    <input type="date" formControlName="promoEndAt">
  </div>

  @if (form.errors?.['promoPeriod'] && form.dirty) {
    <div class="err">Start date must be before end date.</div>
  }
</div>
