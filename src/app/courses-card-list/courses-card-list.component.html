<div class="cards-grid">
  @for (course of courses(); track course.id) {
    <div class="card course-card">
      <img class="card-img" [src]="course.iconUrl" [alt]="course.description">
      <div class="card-body">
        <h3 class="card-title">{{course.description}}</h3>
        <p class="card-text">{{course.longDescription}}</p>
      </div>
      <div class="card-actions">
        <button class="btn btn-primary" [routerLink]="['/courses', course.id]">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          View Course
        </button>
        <button class="btn btn-ghost" (click)="editCourse(course)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          Edit
        </button>
      </div>
    </div>
  }
</div>

@if (selectedCourse()) {
  <div class="modal-backdrop" (click)="selectedCourse.set(null)">
    <div class="modal" (click)="$event.stopPropagation()">
      <course-dialog
        [course]="selectedCourse()!"
        (saved)="selectedCourse.set(null)"
        (closed)="selectedCourse.set(null)">
      </course-dialog>
    </div>
  </div>
}
