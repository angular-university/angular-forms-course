<div class="courses-panel">
  <div class="header">
    <h2 class="title">All Courses</h2>
    <button class="btn-icon" routerLink="/add-new-course" title="Add course">+</button>
  </div>

  <div class="tabs">
    <div class="tab" [class.active]="activeTab === 'beginner'" (click)="activeTab = 'beginner'">Beginners</div>
    <div class="tab" [class.active]="activeTab === 'advanced'" (click)="activeTab = 'advanced'">Advanced</div>
  </div>

  @if (activeTab === 'beginner') {
    <courses-card-list [courses]="beginnerCourses$ | async"></courses-card-list>
  }
  @if (activeTab === 'advanced') {
    <courses-card-list [courses]="advancedCourses$ | async"></courses-card-list>
  }
</div>
