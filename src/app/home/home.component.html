<div class="courses-panel">
  <div class="header">
    <h2 class="title">All Courses</h2>
    <button class="btn-icon" routerLink="/add-new-course" title="Add course">+</button>
  </div>

  <div class="tabs">
    <div class="tab" [class.active]="activeTab() === 'beginner'" (click)="activeTab.set('beginner')">Beginners</div>
    <div class="tab" [class.active]="activeTab() === 'advanced'" (click)="activeTab.set('advanced')">Advanced</div>
  </div>

  @if (activeTab() === 'beginner') {
    <courses-card-list [courses]="beginnerCourses()"></courses-card-list>
  }
  @if (activeTab() === 'advanced') {
    <courses-card-list [courses]="advancedCourses()"></courses-card-list>
  }
</div>
